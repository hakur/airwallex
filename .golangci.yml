version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell

linters-settings:
  dupl:
    threshold: 100

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
    - path: internal/
      linters:
        - dupl
    - path: pa/
      linters:
        - dupl
